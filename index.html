<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家事の達人ツール</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --clay-light: rgba(255, 255, 255, 0.9);
            --clay-shadow: rgba(163, 177, 198, 0.55);
        }

        body {
            background: linear-gradient(160deg, #eef1fb 0%, #e6ecf8 50%, #f3ecf8 100%);
            background-attachment: fixed;
        }

        /* クレイモーフィズム：外側＋内側シャドウでぷっくり浮き上がる質感 */
        .clay {
            box-shadow:
                8px 8px 18px var(--clay-shadow),
                -8px -8px 18px var(--clay-light),
                inset 2px 2px 5px rgba(255, 255, 255, 0.7),
                inset -3px -3px 7px rgba(163, 177, 198, 0.18);
        }

        /* くぼんで見える内側シャドウ（ゲージの溝・入力欄など） */
        .clay-inset {
            box-shadow:
                inset 5px 5px 10px var(--clay-shadow),
                inset -5px -5px 10px var(--clay-light);
        }

        /* ぷにぷにボタン：色付きでも使える立体感。押すとへこむ */
        .clay-pop {
            box-shadow:
                0 10px 20px rgba(0, 0, 0, 0.13),
                inset 2px 2px 5px rgba(255, 255, 255, 0.5),
                inset -5px -7px 10px rgba(0, 0, 0, 0.16);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        .clay-pop:hover { transform: translateY(-1px); }
        .clay-pop:active {
            transform: translateY(2px) scale(0.98);
            box-shadow:
                inset 4px 4px 9px rgba(0, 0, 0, 0.22),
                inset -2px -2px 6px rgba(255, 255, 255, 0.3);
        }

        /* 白系ぷにぷにボタン */
        .clay-pop-light {
            box-shadow:
                6px 6px 14px var(--clay-shadow),
                -6px -6px 14px var(--clay-light),
                inset 1px 1px 3px rgba(255, 255, 255, 0.8);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        .clay-pop-light:hover { transform: translateY(-1px); }
        .clay-pop-light:active {
            transform: translateY(2px) scale(0.98);
            box-shadow:
                inset 5px 5px 10px var(--clay-shadow),
                inset -4px -4px 8px var(--clay-light);
        }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.3s ease-out forwards; }
        @keyframes flame {
            0%, 100% { transform: scale(1) rotate(-4deg); }
            50% { transform: scale(1.18) rotate(4deg); }
        }
        .animate-flame { display: inline-block; animation: flame 0.9s ease-in-out infinite; }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .exp-bar-fill {
            background: linear-gradient(90deg, #fcd34d, #fb923c, #f472b6, #fcd34d);
            background-size: 200% 100%;
            animation: shimmer 2.5s linear infinite;
            box-shadow: inset 0 2px 3px rgba(255, 255, 255, 0.6);
        }
        select { -webkit-appearance: none; appearance: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body class="text-slate-700 font-sans min-h-screen">
    <div class="max-w-md mx-auto min-h-screen relative px-5 pt-7 pb-24 space-y-7">
        <!-- ヘッダー -->
        <header class="text-center">
            <h1 class="text-2xl font-black text-slate-700 tracking-tight">✨ 家事の達人 ✨</h1>
            <p class="text-xs text-slate-400 mt-1.5 font-medium">最高に心地よい空間をキープ</p>
        </header>

        <!-- 連続達成日数（ストリーク） -->
        <div id="streak-banner" class="clay-pop rounded-2xl px-5 py-3.5 bg-gradient-to-r from-amber-400 via-orange-500 to-rose-500 text-white flex items-center justify-center gap-2.5">
            <span id="streak-fire" class="text-2xl drop-shadow">🔥</span>
            <span id="streak-text" class="font-black text-base drop-shadow-sm tracking-tight">記録を読み込み中...</span>
        </div>

        <!-- 今いちばんヤバいタスク（おすすめ） -->
        <div id="suggest-banner" class="hidden clay-inset rounded-2xl px-5 py-3 bg-rose-50/80 text-center">
            <p class="text-xs font-bold text-rose-500"><span id="suggest-text"></span></p>
        </div>

        <!-- 家事の達人度（レベル・経験値） -->
        <section id="level-section" class="clay-pop rounded-[2rem] p-6 bg-gradient-to-br from-amber-300 via-orange-400 to-rose-400 text-white">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <span id="level-badge" class="clay inline-flex items-center justify-center w-14 h-14 rounded-3xl bg-white text-orange-500 font-black text-base">Lv1</span>
                    <div>
                        <p class="text-xs text-white/85 font-semibold">家事の達人度</p>
                        <p id="level-title" class="text-white font-black text-lg drop-shadow-sm leading-tight">家事見習い</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[11px] text-white/85 font-semibold">累計エネルギー</p>
                    <p id="total-exp" class="text-white font-black text-2xl drop-shadow-sm leading-tight">0</p>
                </div>
            </div>
            <div class="clay-inset relative h-5 bg-orange-300/40 rounded-full overflow-hidden p-1">
                <div id="exp-progress-bar" class="exp-bar-fill h-full rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
            </div>
            <p id="exp-progress-text" class="text-xs text-white/95 mt-2.5 text-center font-semibold">次のレベルまで 500</p>
        </section>

        <main class="space-y-7">
            <!-- 今日のエネルギー残量 -->
            <section class="clay rounded-[2rem] p-6 bg-[#eef1fb]">
                <h2 class="text-sm font-bold text-indigo-500 mb-4">🔋 今日のエネルギー残量は？</h2>
                <div class="flex gap-3">
                    <button onclick="setEnergy(10)" id="btn-energy-10" class="clay-pop-light flex-1 py-3.5 rounded-2xl bg-white text-sm font-bold text-slate-600">10%<br><span class="text-[11px] font-medium text-slate-400">ギリギリ</span></button>
                    <button onclick="setEnergy(50)" id="btn-energy-50" class="clay-pop-light flex-1 py-3.5 rounded-2xl bg-white text-sm font-bold text-slate-600">50%<br><span class="text-[11px] font-medium text-slate-400">ぼちぼち</span></button>
                    <button onclick="setEnergy(100)" id="btn-energy-100" class="clay-pop-light flex-1 py-3.5 rounded-2xl bg-white text-sm font-bold text-slate-600">100%<br><span class="text-[11px] font-medium text-slate-400">バッチリ！</span></button>
                </div>
            </section>

            <!-- 必須タスク（固定表示） -->
            <section>
                <h2 class="text-sm font-bold text-slate-500 mb-3 px-2">📌 今日の絶対ミッション（必須）</h2>
                <ul id="fixed-task-list" class="space-y-3">
                    <!-- JavaScriptでここにタスクが生成されます -->
                </ul>
            </section>

            <!-- 今日のランダムお掃除ガチャ -->
            <section class="clay rounded-[2rem] p-7 text-center bg-gradient-to-br from-orange-50 to-rose-50">
                <h2 class="text-sm font-bold text-orange-500 mb-5">🎲 今日のランダムお掃除ガチャ</h2>
                
                <div id="gacha-result" class="clay-inset hidden mb-5 p-5 bg-white/70 rounded-3xl animate-pop">
                    <!-- ガチャ結果がここに表示されます -->
                </div>

                <button onclick="drawGacha()" class="clay-pop bg-gradient-to-br from-orange-400 to-rose-400 text-white font-black text-base py-4 px-10 rounded-full">
                    ガチャを回す！
                </button>
                <p class="text-[11px] text-slate-400 mt-3 font-medium">※エネルギー残量に合わせて出現します</p>
            </section>

            <!-- ついでにやった掃除（アドホックタスク） -->
            <section class="clay rounded-[2rem] p-6 bg-gradient-to-br from-emerald-50 to-teal-50 overflow-hidden">
                <h2 class="text-sm font-bold text-emerald-600 mb-4">✨ ついでにやった掃除を記録</h2>
                <div class="flex flex-col md:flex-row gap-3 w-full min-w-0">
                    <select id="adhoc-task-select" class="clay-inset w-full min-w-0 md:flex-1 px-4 py-3.5 rounded-2xl bg-emerald-50/60 text-sm font-medium text-slate-700 focus:outline-none">
                        <!-- JavaScriptで選択肢が生成されます -->
                    </select>
                    <button onclick="recordAdhocTask()" id="adhoc-record-btn" class="clay-pop w-full md:w-auto md:shrink-0 bg-gradient-to-br from-emerald-400 to-teal-500 text-white text-sm font-bold px-6 py-3.5 rounded-2xl">
                        記録する
                    </button>
                </div>
                <p id="adhoc-message" class="hidden mt-4 text-sm font-bold text-emerald-600 text-center"></p>
            </section>
        </main>

        <!-- 今週のサマリー -->
        <section class="clay-inset rounded-2xl px-5 py-4 bg-white/50 flex items-center justify-center gap-2">
            <span class="text-base">📊</span>
            <p class="text-xs text-slate-400 font-medium">今週こなしたタスク</p>
            <p class="text-sm font-black text-slate-600"><span id="weekly-count">0</span> 件</p>
        </section>

        <!-- 実績バッジ（トロフィー） -->
        <section class="clay rounded-[2rem] p-6 bg-white/70">
            <h2 class="text-sm font-bold text-slate-500 mb-4">🏅 実績バッジ</h2>
            <div id="achievements-grid" class="grid grid-cols-3 gap-3">
                <!-- JavaScriptでバッジが生成されます -->
            </div>
        </section>
    </div>

    <!-- お祝い演出オーバーレイ -->
    <div id="celebrate-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm px-8">
        <div class="clay rounded-[2rem] bg-white px-8 py-10 text-center max-w-xs w-full animate-pop">
            <p id="celebrate-emoji" class="text-6xl mb-3">🎉</p>
            <p id="celebrate-title" class="text-xl font-black text-slate-700 mb-1"></p>
            <p id="celebrate-sub" class="text-sm font-medium text-slate-400"></p>
        </div>
    </div>

    <!-- トースト（実績解除通知など） -->
    <div id="toast" class="hidden fixed left-1/2 -translate-x-1/2 bottom-8 z-[60] clay-pop rounded-full px-6 py-3 bg-slate-800 text-white text-sm font-bold text-center"></div>

    <!-- アプリの裏側（ロジック） -->
    <script>
        // --- 1. データベースの準備（マスターデータ） ---
        const initialTasks = [
            // 必須タスク
            { id: 'toilet', name: 'トイレ掃除', type: 'fixed', intervalDays: 5, energyCost: 30 },
            { id: 'kamekichi_tank', name: '亀吉の水槽掃除', type: 'fixed', weekdayOnly: 0, energyCost: 10 },
            { id: 'washer_lint', name: '洗濯機のごみとり', type: 'fixed', intervalDays: 15, energyCost: 8 },
            // ランダムタスク（ガチャ）：type は 'random' のまま維持（抽選ロジック互換のため）。rarity / reward を付与
            { id: 'bath', name: 'お風呂掃除', type: 'random', intervalDays: 7, energyCost: 40, rarity: 'R' },
            { id: 'sheets', name: 'シーツ洗濯', type: 'random', intervalDays: 7, energyCost: 50, rarity: 'SR', reward: 'ふかふかベッドで二度寝OK🛌' },
            { id: 'ac_filter', name: 'エアコンフィルター掃除', type: 'random', intervalDays: 30, energyCost: 80, rarity: 'SSR', reward: 'コンビニで新作スイーツを買う🍰' },
            { id: 'roomba', name: 'ルンバかける', type: 'random', intervalDays: 2, energyCost: 5, rarity: 'N' },
            { id: 'entrance', name: '玄関掃除', type: 'random', intervalDays: 5, energyCost: 10, rarity: 'N' },
            { id: 'floor_wiper', name: 'フローリングワイパーかける', type: 'random', intervalDays: 5, energyCost: 80, rarity: 'SSR', reward: '好きな映画を1本見る🎬' },
            { id: 'kitchen_stove', name: 'キッチンコンロ掃除', type: 'random', intervalDays: 10, energyCost: 40, rarity: 'R' },
            { id: 'clothes_declutter', name: '洋服断捨離', type: 'random', intervalDays: 90, energyCost: 80, rarity: 'SSR', reward: '欲しかった服を1着ポチる🛍️' },
            { id: 'washroom', name: '洗面所掃除', type: 'random', intervalDays: 10, energyCost: 50, rarity: 'SR', reward: 'お気に入りの入浴剤を使う🛁' },
            { id: 'plants_water', name: '観葉植物水やり', type: 'random', intervalDays: 10, energyCost: 8, rarity: 'N' },
            { id: 'table_tidy', name: 'テーブル片付け', type: 'random', intervalDays: 20, energyCost: 30, rarity: 'R' },
            { id: 'corocoro', name: 'コロコロかける', type: 'random', intervalDays: 5, energyCost: 8, rarity: 'N' },
            { id: 'balcony', name: '🍂 ベランダ掃除', type: 'random', intervalDays: 30, energyCost: 50, rarity: 'SR', reward: 'ベランダでコーヒータイム☕️' },
            { id: 'window', name: '🪟 窓ふき', type: 'random', intervalDays: 15, energyCost: 80, rarity: 'SSR', reward: '窓際でアイスを食べる🍦' },
            { id: 'shoes', name: '👞 靴磨き', type: 'random', intervalDays: 20, energyCost: 40, rarity: 'R' },
            { id: 'cat_cage_bed', name: '猫のケージ・ベッドの掃除', type: 'random', intervalDays: 14, energyCost: 50, rarity: 'SR', reward: '猫と10分じゃらす🐈' },
            { id: 'cat_water_bowl', name: '猫の水飲み器の念入り洗い', type: 'random', intervalDays: 10, energyCost: 8, rarity: 'N' },
            { id: 'microwave', name: '電子レンジ庫内の拭き掃除', type: 'random', intervalDays: 14, energyCost: 8, rarity: 'N' },
            { id: 'fridge', name: '冷蔵庫の中の拭き掃除と賞味期限チェック', type: 'random', intervalDays: 30, energyCost: 40, rarity: 'R' },
            { id: 'curtains', name: 'カーテンの洗濯', type: 'random', intervalDays: 360, energyCost: 80, rarity: 'SSR', reward: '昼寝を30分する😴' },
            { id: 'trash_can', name: 'ゴミ箱拭き', type: 'random', intervalDays: 90, energyCost: 50, rarity: 'SR', reward: '炭酸ジュースを1本飲む🥤' },
            { id: 'duster', name: 'はたき', type: 'random', intervalDays: 15, energyCost: 30, rarity: 'R' },
            { id: 'tidy_one_spot', name: '一か所片付ける', type: 'random', intervalDays: 10, energyCost: 10, rarity: 'N' },
            { id: 'floor_mop', name: 'フローリング雑巾がけ', type: 'random', intervalDays: 20, energyCost: 70, rarity: 'SR', reward: '足を伸ばしてストレッチ🧘' }
        ];

        let currentEnergy = 100;
        let db;
        let adhocMessageTimer = null;
        let allFixedDoneCelebrated = false;

        // お祝いオーバーレイはタップで閉じる
        document.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('celebrate-overlay');
            if (overlay) overlay.addEventListener('click', () => overlay.classList.add('hidden'));
        });

        const EXP_STORAGE_KEY = 'kajiMasterTotalExp';
        const ACHIEVEMENTS_KEY = 'kajiMasterAchievements';
        const ACHIEVEMENTS_VERSION_KEY = 'kajiMasterAchievementsVersion';
        const ACHIEVEMENTS_VERSION = 2; // 実績セットを変更したら +1（既存達成分は静かに反映される）
        const MILESTONES_KEY = 'kajiMasterStreakMilestones';
        const STREAK_MILESTONES = [3, 7, 14, 30, 60, 100];

        // 実績バッジ定義。test(stats) が true になると解除。ハードモード版
        const ACHIEVEMENTS = [
            // レベル系
            { id: 'lv2',    emoji: '🥉', name: '家事ルーキー',   desc: 'レベル2に到達',   test: s => s.level >= 2 },
            { id: 'lv3',    emoji: '🥈', name: '家事レギュラー', desc: 'レベル3に到達',   test: s => s.level >= 3 },
            { id: 'lv4',    emoji: '🥇', name: '家事マスター',   desc: 'レベル4に到達',   test: s => s.level >= 4 },
            { id: 'lv5',    emoji: '👑', name: '伝説の家事神',   desc: 'レベル5に到達',   test: s => s.level >= 5 },
            // 累計こなした数
            { id: 'c30',    emoji: '🧹', name: 'コツコツ屋',     desc: '累計30件クリア',  test: s => s.total >= 30 },
            { id: 'c100',   emoji: '🧽', name: '掃除の鬼',       desc: '累計100件クリア', test: s => s.total >= 100 },
            { id: 'c300',   emoji: '🧼', name: 'クリーン番長',   desc: '累計300件クリア', test: s => s.total >= 300 },
            { id: 'c500',   emoji: '🌟', name: '掃除仙人',       desc: '累計500件クリア', test: s => s.total >= 500 },
            // 連続達成
            { id: 's7',     emoji: '🔥', name: '一週間皆勤',     desc: '7日連続で達成',   test: s => s.streak >= 7 },
            { id: 's30',    emoji: '💎', name: '継続の達人',     desc: '30日連続で達成',  test: s => s.streak >= 30 },
            { id: 's100',   emoji: '🗿', name: '鉄の意志',       desc: '100日連続で達成', test: s => s.streak >= 100 },
            // ガチャSSR
            { id: 'ssr1',   emoji: '⭐', name: 'SSRハンター',    desc: 'SSRを1回クリア',  test: s => s.ssr >= 1 },
            { id: 'ssr10',  emoji: '🎰', name: 'SSRコレクター',  desc: 'SSRを10回クリア', test: s => s.ssr >= 10 }
        ];

        // レア度の早見表（完了履歴からSSR判定するため）
        const rarityById = new Map();
        initialTasks.forEach(t => { if (t.rarity) rarityById.set(t.id, t.rarity); });

        // --- お祝い演出の共通ヘルパー ---
        function fireConfetti(options = {}) {
            if (typeof confetti !== 'function') return;
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, ...options });
        }

        function fireBigConfetti(colors) {
            if (typeof confetti !== 'function') return;
            const base = { spread: 90, startVelocity: 45, origin: { y: 0.55 } };
            fireConfetti({ ...base, particleCount: 120, colors });
            setTimeout(() => fireConfetti({ ...base, particleCount: 80, angle: 60, origin: { x: 0, y: 0.6 }, colors }), 150);
            setTimeout(() => fireConfetti({ ...base, particleCount: 80, angle: 120, origin: { x: 1, y: 0.6 }, colors }), 300);
        }

        let celebrateTimer = null;
        function showCelebration(emoji, title, sub, colors) {
            const overlay = document.getElementById('celebrate-overlay');
            document.getElementById('celebrate-emoji').textContent = emoji;
            document.getElementById('celebrate-title').textContent = title;
            document.getElementById('celebrate-sub').textContent = sub || '';
            overlay.classList.remove('hidden');
            fireBigConfetti(colors);
            if (celebrateTimer) clearTimeout(celebrateTimer);
            celebrateTimer = setTimeout(() => overlay.classList.add('hidden'), 2600);
        }

        let toastTimer = null;
        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.classList.remove('hidden');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        const levelTiers = [
            { level: 1, title: '家事見習い', minExp: 0 },
            { level: 2, title: '家事ルーキー', minExp: 500 },
            { level: 3, title: '家事レギュラー', minExp: 2000 },
            { level: 4, title: '家事マスター', minExp: 5000 },
            { level: 5, title: '伝説の家事神', minExp: 15000 }
        ];

        function getTotalExp() {
            return parseInt(localStorage.getItem(EXP_STORAGE_KEY) || '0', 10);
        }

        function addExp(amount) {
            const gained = Number(amount) || 0;
            if (gained <= 0) return getTotalExp();
            const newTotal = getTotalExp() + gained;
            localStorage.setItem(EXP_STORAGE_KEY, String(newTotal));
            return newTotal;
        }

        function getLevelInfo(totalExp) {
            let currentTier = levelTiers[0];
            for (const tier of levelTiers) {
                if (totalExp >= tier.minExp) currentTier = tier;
            }

            const currentIndex = levelTiers.findIndex(t => t.level === currentTier.level);
            const nextTier = levelTiers[currentIndex + 1];
            const isMaxLevel = !nextTier;

            if (isMaxLevel) {
                return {
                    level: currentTier.level,
                    title: currentTier.title,
                    totalExp,
                    progressPercent: 100,
                    expToNext: 0,
                    nextLevelExp: null,
                    isMaxLevel: true
                };
            }

            const expInLevel = totalExp - currentTier.minExp;
            const expNeeded = nextTier.minExp - currentTier.minExp;
            const progressPercent = Math.min(100, Math.round((expInLevel / expNeeded) * 100));

            return {
                level: currentTier.level,
                title: currentTier.title,
                totalExp,
                progressPercent,
                expToNext: nextTier.minExp - totalExp,
                nextLevelExp: nextTier.minExp,
                isMaxLevel: false
            };
        }

        function updateLevelDisplay() {
            const info = getLevelInfo(getTotalExp());
            document.getElementById('level-badge').textContent = `Lv${info.level}`;
            document.getElementById('level-title').textContent = info.title;
            document.getElementById('total-exp').textContent = info.totalExp.toLocaleString();
            document.getElementById('exp-progress-bar').style.width = `${info.progressPercent}%`;

            const progressText = document.getElementById('exp-progress-text');
            if (info.isMaxLevel) {
                progressText.textContent = '🎉 最高レベル到達！伝説の家事神！';
            } else {
                progressText.textContent = `次のレベルまで ${info.expToNext.toLocaleString()}（Lv${info.level + 1} まで ${info.progressPercent}%）`;
            }
        }

        // --- 2. IndexedDB（ブラウザの保存領域）の初期化 ---
        const request = indexedDB.open("KajiMasterDB", 4);

        request.onupgradeneeded = function(event) {
            db = event.target.result;
            if (!db.objectStoreNames.contains("tasks")) {
                db.createObjectStore("tasks", { keyPath: "id" });
            }
            // 完了履歴ストア（達成感の可視化・統計用）。1完了 = 1レコード
            if (!db.objectStoreNames.contains("completionHistory")) {
                const historyStore = db.createObjectStore("completionHistory", { keyPath: "key", autoIncrement: true });
                historyStore.createIndex("byDate", "date", { unique: false });
            }
        };

        request.onsuccess = function(event) {
            db = event.target.result;
            syncMasterTasks(refreshUI);
            scheduleMidnightRefresh();
        };

        function scheduleMidnightRefresh() {
            const now = new Date();
            const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            setTimeout(() => {
                refreshUI();
                scheduleMidnightRefresh();
            }, tomorrow - now);
        }

        function syncMasterTasks(callback) {
            const transaction = db.transaction(["tasks"], "readwrite");
            const objectStore = transaction.objectStore("tasks");
            const getAllRequest = objectStore.getAll();

            getAllRequest.onsuccess = function() {
                const existingMap = new Map(getAllRequest.result.map(task => [task.id, task]));

                if (existingMap.has('shoe_polish') && !existingMap.has('shoes')) {
                    const legacyTask = existingMap.get('shoe_polish');
                    objectStore.put({ ...initialTasks.find(t => t.id === 'shoes'), lastCleanedDate: legacyTask.lastCleanedDate });
                    objectStore.delete('shoe_polish');
                    existingMap.delete('shoe_polish');
                }

                initialTasks.forEach(masterTask => {
                    const existingTask = existingMap.get(masterTask.id);
                    if (existingTask) {
                        objectStore.put({ ...existingTask, ...masterTask, lastCleanedDate: existingTask.lastCleanedDate });
                    } else {
                        objectStore.add({ ...masterTask, lastCleanedDate: null });
                    }
                });
            };

            transaction.oncomplete = function() {
                if (callback) callback();
            };
        }

        function refreshUI() {
            loadFixedTasks();
            loadAdhocTaskSelect();
            updateLevelDisplay();
            updateStatsUI();
            updateSuggestion();
        }

        // 「今いちばんヤバいタスク」＝期限を最も過ぎているタスクを1つ提案
        function updateSuggestion() {
            if (!db) return;
            const transaction = db.transaction(["tasks"], "readonly");
            const request = transaction.objectStore("tasks").getAll();
            request.onsuccess = function() {
                const now = Date.now();
                let worst = null;
                let worstRatio = 1; // 期限（1.0倍）を超えたものだけ対象
                request.result.forEach(task => {
                    if (!task.intervalDays || !task.lastCleanedDate) return;
                    if (isTaskDoneToday(task)) return;
                    const intervalMs = task.intervalDays * 24 * 60 * 60 * 1000;
                    const ratio = (now - task.lastCleanedDate) / intervalMs;
                    if (ratio > worstRatio) { worstRatio = ratio; worst = task; }
                });

                const banner = document.getElementById('suggest-banner');
                const textEl = document.getElementById('suggest-text');
                if (!banner || !textEl) return;

                if (worst) {
                    const overdueDays = Math.floor((now - worst.lastCleanedDate) / (24 * 60 * 60 * 1000)) - worst.intervalDays;
                    const daysText = overdueDays > 0 ? `（${overdueDays}日オーバー）` : '';
                    textEl.textContent = `🚨 そろそろ「${worst.name}」がヤバいかも${daysText}`;
                    banner.classList.remove('hidden');
                } else {
                    banner.classList.add('hidden');
                }
            };
        }

        updateLevelDisplay();
        setEnergy(100); // 起動時に「バッチリ！(100%)」を選択済みにする

        // --- 完了履歴・統計（達成感の可視化） ---

        // ローカル時間基準の 'YYYY-MM-DD'
        function toDateKey(date) {
            const d = date instanceof Date ? date : new Date(date);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        // タスク完了を completionHistory に1件保存
        function recordCompletion(task) {
            if (!db || !db.objectStoreNames.contains("completionHistory")) return;
            const transaction = db.transaction(["completionHistory"], "readwrite");
            transaction.objectStore("completionHistory").add({
                kind: 'completion',
                taskId: task.id,
                taskType: task.type,
                date: toDateKey(new Date()),
                timestamp: Date.now()
            });
        }

        // 必須タスクを全て完了した日（allFixedDone マーカー）を1日1回だけ記録
        function markAllFixedDone(callback) {
            if (!db || !db.objectStoreNames.contains("completionHistory")) {
                if (callback) callback();
                return;
            }
            const todayKey = toDateKey(new Date());
            const transaction = db.transaction(["completionHistory"], "readwrite");
            const store = transaction.objectStore("completionHistory");
            const getAllRequest = store.getAll();
            getAllRequest.onsuccess = function() {
                const exists = getAllRequest.result.some(r => r.kind === 'allFixedDone' && r.date === todayKey);
                if (!exists) {
                    store.add({ kind: 'allFixedDone', date: todayKey, timestamp: Date.now() });
                }
            };
            transaction.oncomplete = function() {
                if (callback) callback();
            };
        }

        // 連続達成日数（allFixedDone が今日 or 昨日から何日連続しているか）
        function calcStreak(allFixedDoneDates) {
            const doneSet = new Set(allFixedDoneDates);
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // 起点：今日が達成済みなら今日から、未達成でも昨日が達成済みなら昨日から数える
            let cursor = new Date(today);
            if (!doneSet.has(toDateKey(cursor))) {
                cursor.setDate(cursor.getDate() - 1);
                if (!doneSet.has(toDateKey(cursor))) return 0;
            }

            let streak = 0;
            while (doneSet.has(toDateKey(cursor))) {
                streak++;
                cursor.setDate(cursor.getDate() - 1);
            }
            return streak;
        }

        // 今週（月曜始まり）の完了タスク総数
        function calcWeeklyCount(records) {
            const now = new Date();
            const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const dayOfWeek = (start.getDay() + 6) % 7; // 月=0 ... 日=6
            start.setDate(start.getDate() - dayOfWeek);
            const startMs = start.getTime();
            return records.filter(r => r.kind === 'completion' && r.timestamp >= startMs).length;
        }

        // 統計UI（ストリーク・今週の総数）を再計算して描画
        function updateStatsUI() {
            if (!db || !db.objectStoreNames.contains("completionHistory")) return;
            const transaction = db.transaction(["completionHistory"], "readonly");
            const getAllRequest = transaction.objectStore("completionHistory").getAll();
            getAllRequest.onsuccess = function() {
                const records = getAllRequest.result || [];
                const doneDates = records.filter(r => r.kind === 'allFixedDone').map(r => r.date);
                const streak = calcStreak(doneDates);
                const weeklyCount = calcWeeklyCount(records);

                const streakText = document.getElementById('streak-text');
                const streakFire = document.getElementById('streak-fire');
                if (streakText) {
                    if (streak > 0) {
                        streakText.textContent = `${streak}日連続達成中！`;
                        if (streakFire) streakFire.classList.add('animate-flame');
                    } else {
                        streakText.textContent = '今日の必須ミッションを達成しよう！';
                        if (streakFire) streakFire.classList.remove('animate-flame');
                    }
                }

                const weeklyEl = document.getElementById('weekly-count');
                if (weeklyEl) weeklyEl.textContent = weeklyCount;

                // 実績・ストリークマイルストーンの判定
                const total = records.filter(r => r.kind === 'completion').length;
                const ssr = records.filter(r => r.kind === 'completion' && rarityById.get(r.taskId) === 'SSR').length;
                const level = getLevelInfo(getTotalExp()).level;
                checkAchievements({ total, ssr, level, streak, weekly: weeklyCount });
                checkStreakMilestones(streak);
            };
        }

        // --- 実績バッジ ---
        function getUnlockedAchievements() {
            try { return JSON.parse(localStorage.getItem(ACHIEVEMENTS_KEY)) || []; }
            catch (e) { return []; }
        }

        function checkAchievements(stats) {
            // 初回、または実績セットのバージョンが変わったときは「静かに」既存達成分を反映（演出なし）
            const storedVersion = parseInt(localStorage.getItem(ACHIEVEMENTS_VERSION_KEY) || '0', 10);
            const silent = localStorage.getItem(ACHIEVEMENTS_KEY) === null || storedVersion !== ACHIEVEMENTS_VERSION;

            const unlocked = new Set(getUnlockedAchievements());
            const newlyUnlocked = [];
            ACHIEVEMENTS.forEach(a => {
                if (!unlocked.has(a.id) && a.test(stats)) {
                    unlocked.add(a.id);
                    if (!silent) newlyUnlocked.push(a);
                }
            });
            localStorage.setItem(ACHIEVEMENTS_KEY, JSON.stringify([...unlocked]));
            localStorage.setItem(ACHIEVEMENTS_VERSION_KEY, String(ACHIEVEMENTS_VERSION));
            renderAchievements(unlocked);

            // 新規解除は1件ずつ順番にトースト＋紙吹雪
            newlyUnlocked.forEach((a, i) => {
                setTimeout(() => {
                    showToast(`🏅 実績解除：${a.emoji} ${a.name}`);
                    fireConfetti({ particleCount: 60, spread: 55 });
                }, 900 + i * 1400);
            });
        }

        function renderAchievements(unlockedSet) {
            const grid = document.getElementById('achievements-grid');
            if (!grid) return;
            const unlocked = unlockedSet instanceof Set ? unlockedSet : new Set(getUnlockedAchievements());
            grid.innerHTML = '';
            ACHIEVEMENTS.forEach(a => {
                const isUnlocked = unlocked.has(a.id);
                const cell = document.createElement('div');
                cell.className = `rounded-2xl px-2 py-3 text-center ${isUnlocked ? 'clay bg-white' : 'clay-inset bg-slate-100/70'}`;
                cell.title = a.desc;
                cell.innerHTML = `
                    <div class="text-2xl ${isUnlocked ? '' : 'grayscale opacity-40'}">${isUnlocked ? a.emoji : '🔒'}</div>
                    <div class="text-[10px] font-bold mt-1 ${isUnlocked ? 'text-slate-600' : 'text-slate-400'}">${a.name}</div>
                    <div class="text-[9px] mt-0.5 leading-tight ${isUnlocked ? 'text-slate-400' : 'text-slate-300'}">${a.desc}</div>
                `;
                grid.appendChild(cell);
            });
        }

        // --- ストリークのマイルストーン祝福 ---
        function getCelebratedMilestones() {
            try { return JSON.parse(localStorage.getItem(MILESTONES_KEY)) || []; }
            catch (e) { return []; }
        }

        function checkStreakMilestones(streak) {
            const firstRun = localStorage.getItem(MILESTONES_KEY) === null;
            const celebrated = new Set(getCelebratedMilestones());
            // 途切れて下がったマイルストーンは解除（再達成でまた祝えるように）
            STREAK_MILESTONES.forEach(m => { if (streak < m) celebrated.delete(m); });
            STREAK_MILESTONES.forEach(m => {
                if (streak >= m && !celebrated.has(m)) {
                    celebrated.add(m);
                    if (!firstRun) {
                        setTimeout(() => showCelebration('🔥', `${m}日連続達成！`, 'この調子で家事の達人へ！', ['#fb923c', '#f43f5e', '#fbbf24']), 500);
                    }
                }
            });
            localStorage.setItem(MILESTONES_KEY, JSON.stringify([...celebrated]));
        }

        // --- 3. UIの操作とロジック ---

        function isTaskDoneToday(task) {
            return task.lastCleanedDate && (new Date().toDateString() === new Date(task.lastCleanedDate).toDateString());
        }

        function isFixedTaskDue(task) {
            const now = new Date();
            if (task.weekdayOnly !== undefined && now.getDay() !== task.weekdayOnly) return false;
            if (!task.lastCleanedDate) return true;
            if (isTaskDoneToday(task)) return false;
            if (task.intervalDays) {
                const intervalMs = task.intervalDays * 24 * 60 * 60 * 1000;
                return (task.lastCleanedDate + intervalMs) <= now.getTime();
            }
            return true;
        }

        function shouldShowFixedTask(task) {
            const now = new Date();

            // 今日すでに完了していれば非表示
            if (isTaskDoneToday(task)) return false;

            // 曜日指定タスク（週1回）の処理
            if (task.weekdayOnly !== undefined) {
                // 本来の予定曜日でなければ非表示
                if (now.getDay() !== task.weekdayOnly) return false;
                // 前倒し完了の考慮：最終完了日が過去6日以内なら「今週分は完了済み」とみなし非表示
                if (task.lastCleanedDate) {
                    const sixDaysMs = 6 * 24 * 60 * 60 * 1000;
                    if ((now.getTime() - task.lastCleanedDate) <= sixDaysMs) return false;
                }
                return true;
            }

            // intervalDays タスク：期限（潜伏期間）が来ていれば表示、完了済みは非表示
            return isFixedTaskDue(task);
        }

        // エネルギー設定関数
        function setEnergy(level) {
            currentEnergy = level;
            // ボタンの見た目を変える処理
            [10, 50, 100].forEach(val => {
                const btn = document.getElementById(`btn-energy-${val}`);
                if (val === level) {
                    btn.className = "clay-pop flex-1 py-3.5 rounded-2xl bg-gradient-to-br from-indigo-400 to-indigo-500 text-white text-sm font-bold";
                } else {
                    btn.className = "clay-pop-light flex-1 py-3.5 rounded-2xl bg-white text-sm font-bold text-slate-600";
                }
            });
            // ガチャ結果を一回隠す
            document.getElementById('gacha-result').classList.add('hidden');
        }

        // 必須タスクの表示関数
        function loadFixedTasks() {
            const transaction = db.transaction(["tasks"], "readonly");
            const objectStore = transaction.objectStore("tasks");
            const request = objectStore.getAll();

            request.onsuccess = function(event) {
                const allTasks = event.target.result;
                const fixedList = document.getElementById('fixed-task-list');
                fixedList.innerHTML = ''; // 一旦クリア

                // 未完了かつ実施すべき必須タスクだけを抽出して表示（完了済みは非表示）
                const fixedTasks = allTasks.filter(t => t.type === 'fixed' && shouldShowFixedTask(t));

                // 表示すべきタスクが1つもない場合は達成メッセージを表示
                if (fixedTasks.length === 0) {
                    const li = document.createElement('li');
                    li.className = 'clay-inset rounded-3xl px-6 py-7 bg-white/60 text-center';
                    li.innerHTML = `
                        <p class="text-2xl mb-2">🎉</p>
                        <p class="text-sm font-bold text-slate-500 leading-relaxed">今日の絶対ミッションはすべて完了しています！</p>
                        <p class="text-xs text-slate-400 mt-1.5 font-medium">余裕があったら掃除ガチャしてね</p>
                    `;
                    fixedList.appendChild(li);

                    // 全完了に「切り替わった」タイミングで一度だけ紙吹雪を出す
                    if (!allFixedDoneCelebrated && typeof confetti === 'function') {
                        confetti({
                            particleCount: 100,
                            spread: 70,
                            origin: { y: 0.6 }
                        });
                    }
                    allFixedDoneCelebrated = true;

                    // 「必須タスク全完了」の日を履歴に記録し、ストリーク表示を更新
                    markAllFixedDone(updateStatsUI);
                    return;
                }

                // 未完了タスクが残っている間は次回の全完了で再び祝えるようフラグを戻す
                allFixedDoneCelebrated = false;

                fixedTasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = 'flex items-center justify-between gap-3 px-5 py-4 rounded-3xl clay bg-white transition-opacity duration-300';
                    li.innerHTML = `
                        <span class="text-sm font-bold text-slate-700">${task.name}</span>
                        <button onclick="completeFixedTask('${task.id}', this)" class="clay-pop bg-gradient-to-br from-emerald-400 to-teal-500 text-white text-xs font-bold px-4 py-2 rounded-2xl shrink-0">
                            完了
                        </button>
                    `;
                    fixedList.appendChild(li);
                });
            };
        }

        // ついでにやった掃除の選択肢を更新
        function loadAdhocTaskSelect() {
            const transaction = db.transaction(["tasks"], "readonly");
            const objectStore = transaction.objectStore("tasks");
            const request = objectStore.getAll();

            request.onsuccess = function(event) {
                const allTasks = event.target.result;
                const taskMap = new Map(allTasks.map(task => [task.id, task]));
                const incompleteTasks = initialTasks
                    .map(masterTask => taskMap.get(masterTask.id))
                    .filter(task => task && !isTaskDoneToday(task));

                const select = document.getElementById('adhoc-task-select');
                const recordBtn = document.getElementById('adhoc-record-btn');
                select.innerHTML = '';

                if (incompleteTasks.length === 0) {
                    select.innerHTML = '<option value="">今日記録できるタスクはありません</option>';
                    select.disabled = true;
                    recordBtn.disabled = true;
                    recordBtn.className = 'clay-inset w-full md:w-auto md:shrink-0 bg-slate-200 text-slate-400 text-sm font-bold px-6 py-3.5 rounded-2xl cursor-not-allowed';
                    return;
                }

                select.disabled = false;
                recordBtn.disabled = false;
                recordBtn.className = 'clay-pop w-full md:w-auto md:shrink-0 bg-gradient-to-br from-emerald-400 to-teal-500 text-white text-sm font-bold px-6 py-3.5 rounded-2xl';

                incompleteTasks.forEach(task => {
                    const option = document.createElement('option');
                    option.value = task.id;
                    option.textContent = task.name;
                    select.appendChild(option);
                });
            };
        }

        function showAdhocMessage(message) {
            const messageEl = document.getElementById('adhoc-message');
            messageEl.textContent = message;
            messageEl.classList.remove('hidden');

            if (adhocMessageTimer) clearTimeout(adhocMessageTimer);
            adhocMessageTimer = setTimeout(() => {
                messageEl.classList.add('hidden');
            }, 3000);
        }

        function recordAdhocTask() {
            const taskId = document.getElementById('adhoc-task-select').value;
            if (!taskId) return;
            completeTask(taskId, {
                onSuccess: (task) => showAdhocMessage(`${task.name}を記録しました！（+${task.energyCost} EXP）`)
            });
        }

        // レア度バッジ（SSR:金 / SR:紫 / R:青 / N:グレー）
        function renderRarityBadge(rarity) {
            const styles = {
                SSR: 'bg-gradient-to-r from-amber-300 via-yellow-400 to-amber-500 text-white shadow-amber-300/50',
                SR: 'bg-purple-500 text-white shadow-purple-400/40',
                R: 'bg-blue-500 text-white shadow-blue-400/40',
                N: 'bg-slate-400 text-white shadow-slate-300/40'
            };
            const cls = styles[rarity] || styles.N;
            return `<span class="inline-block ${cls} text-[11px] font-black px-3 py-1 rounded-full shadow-md tracking-widest">${rarity}</span>`;
        }

        // ガチャを回す関数
        function drawGacha() {
            const transaction = db.transaction(["tasks"], "readonly");
            const objectStore = transaction.objectStore("tasks");
            const request = objectStore.getAll();

            request.onsuccess = function(event) {
                const allTasks = event.target.result;
                const now = new Date().getTime();
                
                // ガチャの候補を絞り込む条件
                // 1. randomタスクであること
                // 2. 設定したエネルギー残量（currentEnergy）以下のタスクであること
                // 3. インターバル（潜伏期間）を過ぎていること
                const candidates = allTasks.filter(task => {
                    if (task.type !== 'random') return false;
                    if (task.energyCost > currentEnergy) return false;
                    
                    // まだ一度も掃除してなければ候補に入れる
                    if (!task.lastCleanedDate) return true;

                    // 前回掃除した日 + 理想の間隔(日数) が現在時刻より過去なら候補に入れる
                    const intervalMs = task.intervalDays * 24 * 60 * 60 * 1000;
                    return (task.lastCleanedDate + intervalMs) <= now;
                });

                const resultDiv = document.getElementById('gacha-result');
                resultDiv.classList.remove('hidden');
                
                // アニメーションを再トリガーするための小技
                resultDiv.classList.remove('animate-pop');
                void resultDiv.offsetWidth;
                resultDiv.classList.add('animate-pop');

                if (candidates.length === 0) {
                    resultDiv.innerHTML = `<p class="text-orange-500 font-bold">今日はもう十分！休んでいいよ☕️</p>`;
                    return;
                }

                // ランダムに1つ選ぶ（結果は先に確定させ、演出だけ後から見せる）
                const randomTask = candidates[Math.floor(Math.random() * candidates.length)];

                // 抽選ドラマ：候補名とレア度をパラパラ切り替えてから結果を確定
                const rollRarities = ['N', 'R', 'SR', 'SSR'];
                let ticks = 0;
                const totalTicks = 12;
                resultDiv.innerHTML = `
                    <div class="text-[11px] font-semibold text-orange-400 mb-2">抽選中...</div>
                    <div class="mb-2" id="gacha-roll-badge">${renderRarityBadge('N')}</div>
                    <div class="text-lg font-black text-slate-400" id="gacha-roll-name">🎲 🎲 🎲</div>
                `;
                const rollBadge = document.getElementById('gacha-roll-badge');
                const rollName = document.getElementById('gacha-roll-name');
                const rollTimer = setInterval(() => {
                    const rc = candidates[Math.floor(Math.random() * candidates.length)];
                    if (rollName) rollName.textContent = rc.name;
                    if (rollBadge) rollBadge.innerHTML = renderRarityBadge(rollRarities[Math.floor(Math.random() * rollRarities.length)]);
                    ticks++;
                    if (ticks >= totalTicks) {
                        clearInterval(rollTimer);
                        revealGacha(randomTask, resultDiv);
                    }
                }, 90);
            };
        }

        // ガチャ結果を確定表示（SSRは特別演出＋金色紙吹雪）
        function revealGacha(randomTask, resultDiv) {
            const rarityBadge = randomTask.rarity ? renderRarityBadge(randomTask.rarity) : '';
            const rewardHtml = randomTask.reward ? `
                <div class="mt-1 mb-4 px-4 py-2.5 rounded-2xl bg-gradient-to-r from-pink-100 via-rose-50 to-amber-100 border border-pink-200/70 shadow-sm">
                    <p class="text-xs font-bold text-pink-500">🎁 クリア報酬: <span class="text-rose-500">${randomTask.reward}</span></p>
                </div>
            ` : '';

            resultDiv.classList.remove('animate-pop');
            void resultDiv.offsetWidth;
            resultDiv.classList.add('animate-pop');

            const isSSR = randomTask.rarity === 'SSR';
            resultDiv.innerHTML = `
                ${isSSR
                    ? '<div class="text-sm font-black text-amber-500 mb-1 tracking-widest animate-flame">✨ SSR 大当たり！ ✨</div>'
                    : '<div class="text-[11px] font-semibold text-orange-400 mb-2">今日のミッション</div>'}
                ${rarityBadge ? `<div class="mb-2">${rarityBadge}</div>` : ''}
                <div class="text-lg font-black text-slate-700 ${randomTask.reward ? 'mb-2' : 'mb-4'}">${randomTask.name}</div>
                ${rewardHtml}
                <button onclick="completeTask('${randomTask.id}')" class="clay-pop bg-gradient-to-br from-orange-400 to-rose-400 text-white text-sm font-bold py-3 px-8 rounded-full">
                    完了する！
                </button>
            `;

            if (isSSR) {
                fireBigConfetti(['#fcd34d', '#f59e0b', '#fff7cd']);
            } else if (randomTask.rarity === 'SR') {
                fireConfetti({ colors: ['#c084fc', '#a855f7', '#f0abfc'] });
            }
        }

        // 必須タスクの完了：フェードアウトしてから既存の完了処理（DB更新・再描画）を実行
        function completeFixedTask(id, btnEl) {
            const li = btnEl && btnEl.closest('li');
            if (!li) {
                completeTask(id);
                return;
            }
            // 二重クリック防止
            btnEl.disabled = true;
            li.classList.add('opacity-0');
            setTimeout(() => completeTask(id), 300);
        }

        // タスク完了処理（データベースの最終実施日を現在時刻で上書き）
        function completeTask(id, options = {}) {
            const transaction = db.transaction(["tasks"], "readwrite");
            const objectStore = transaction.objectStore("tasks");
            const getRequest = objectStore.get(id);

            getRequest.onsuccess = function(event) {
                const task = event.target.result;
                if (!task) return;

                task.lastCleanedDate = new Date().getTime();

                const updateRequest = objectStore.put(task);
                updateRequest.onsuccess = function() {
                    // レベルアップ判定（EXP加算の前後でレベルを比較）
                    const beforeLevel = getLevelInfo(getTotalExp()).level;
                    addExp(task.energyCost);
                    const afterInfo = getLevelInfo(getTotalExp());
                    recordCompletion(task);
                    refreshUI();
                    if (options.onSuccess) {
                        options.onSuccess(task);
                    } else if (task.type === 'random') {
                        document.getElementById('gacha-result').innerHTML = `<p class="text-emerald-500 font-bold">✨ お疲れ様！+${task.energyCost} EXP 獲得！ ✨</p>`;
                    }
                    // レベルが上がっていたら昇格演出（少し遅らせてタスク消化アニメと重ならないように）
                    if (afterInfo.level > beforeLevel) {
                        setTimeout(() => {
                            showCelebration('🎉', `Lv${afterInfo.level} に昇格！`, `称号「${afterInfo.title}」を獲得！`, ['#a78bfa', '#f472b6', '#fcd34d']);
                        }, 400);
                    }
                };
            };
        }
    </script>
</body>
</html>
